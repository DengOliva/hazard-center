<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>防城港三期 内外部安全看板</title>
<link rel="stylesheet" href="/alert/style.css">
</head>
<body>

<header class="top-bar">
  <h1>防城港三期 内外部安全看板</h1>
  <span class="subtitle">预警刹车机制数据总览</span>
  <div class="header-actions">
    <button id="btn-import" class="btn-import">导入台账数据</button>
  </div>
</header>

<dialog id="import-dialog">
  <div class="dialog-content">
    <h3>导入台账数据</h3>
    <p>请上传 "防城港三期安全管理数据总台账" Excel 文件（.xlsx 或 .xls）</p>
    <input type="file" id="import-file" accept=".xlsx,.xls">
    <div class="dialog-status" id="import-status"></div>
    <div class="dialog-btns">
      <button id="btn-upload" class="btn-primary" disabled>上传并解析</button>
      <button id="btn-cancel" class="btn-secondary">取消</button>
    </div>
  </div>
</dialog>

<main>
  <div class="filters panel">
    <label>开始日期<input type="date" id="start-date"></label>
    <label>结束日期<input type="date" id="end-date"></label>
    <button id="btn-filter" class="btn-filter">筛选</button>
  </div>

  <section class="panel" id="sec-external">
    <h2 class="section-title">一、外部预警刹车数据统计</h2>
    <div class="card-row card-row-8" id="cards-external"></div>
  </section>
  <section class="panel" id="sec-internal">
    <h2 class="section-title">二、项目内部预警刹车数据统计</h2>
    <div class="card-row card-row-4" id="cards-internal"></div>
  </section>
  <section class="panel">
    <h2 class="section-title">三、安质环考核得分 &amp; 五星评估得分</h2>
    <div class="charts-row">
      <div class="chart-box">
        <h3>五星评估得分 <small>（趋势）</small></h3>
        <canvas id="chart-star5"></canvas>
        <div class="chart-legend">
          <span class="legend-item"><i style="background:#e6a23c"></i>2025年</span>
          <span class="legend-item"><i style="background:#c84d4d"></i>2026年</span>
        </div>
      </div>
      <div class="chart-box">
        <h3>安质环考核得分 <small>（趋势）</small></h3>
        <canvas id="chart-aqhb"></canvas>
        <div class="chart-legend">
          <span class="legend-item"><i style="background:#087b68"></i>2025年</span>
          <span class="legend-item"><i style="background:#409eff"></i>2026年</span>
        </div>
      </div>
    </div>
  </section>
  <section class="panel" id="sec-type-analysis">
    <h2 class="section-title">四、问题类型统计分析</h2>
    <div class="filter-bar">
      <label>类别：<select id="type-cat-filter">
        <option value="">全部</option>
        <option value="external">外部预警刹车</option>
        <option value="internal">项目内部预警刹车</option>
      </select></label>
      <label>预警类型：<select id="type-name-filter">
        <option value="">全部类型</option>
      </select></label>
    </div>
    <div class="charts-row">
      <div class="chart-box">
        <h3>预警类型占比</h3>
        <canvas id="chart-type-pie"></canvas>
        <div class="chart-legend" id="type-pie-legend"></div>
      </div>
      <div class="chart-box">
        <h3>预警类型排行</h3>
        <canvas id="chart-type-bar"></canvas>
      </div>
    </div>
  </section>
  <section class="panel" id="sec-subcontractors">
    <h2 class="section-title">五、分包单位预警刹车数据统计</h2>
    <div class="filter-bar">
      <label>筛选分包单位：</label>
      <select id="sub-filter"><option value="">全部</option></select>
    </div>
    <div class="card-row card-row-8" id="sub-ext-cards"></div>
    <div class="card-row card-row-4" id="sub-int-cards"></div>
  </section>
  <section class="panel" id="sec-departments">
    <h2 class="section-title">六、各部门预警刹车数据统计</h2>
    <div class="filter-bar">
      <label>筛选部门：</label>
      <select id="dept-filter"><option value="">全部</option></select>
    </div>
    <div class="card-row card-row-8" id="dept-ext-cards"></div>
    <div class="card-row card-row-4" id="dept-int-cards"></div>
  </section>
</main>

<script src="/alert/app.js"></script>
</body>
</html>
