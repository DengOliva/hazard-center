<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>体系部门周会材料</title>
<link rel="stylesheet" href="/meeting/style.css">
</head>
<body>

<div id="topbar">
  <a href="/">← 看板</a>
  <label>周范围</label>
  <input type="date" id="ws"> <span style="color:#888;">—</span> <input type="date" id="we">
  <button id="btn-refresh">刷新</button>
  <span class="spacer"></span>
  <button id="btn-prev" title="←">◀</button>
  <span class="info"><span id="cur">1</span>/<span id="tot">22</span></span>
  <button id="btn-next" title="→">▶</button>
  <button id="btn-export" class="accent">导出PPTX</button>
  <span class="info" id="save-dot"></span>
</div>

<div id="stage"></div>
<div id="keyhint">← → 翻页 · 表格双击编辑 · Ctrl+S 保存</div>

<script>
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const WEEK = ['周日','周一','周二','周三','周四','周五','周六'];

let cur = 0, total = 22;
let meetingData = {}, savedManual = {}, dirty = false;

// ─── Init dates ────────────────────────────────────────────
function initDates() {
  const d = new Date();
  const mon = new Date(d); mon.setDate(d.getDate() - (d.getDay()===0?6:d.getDay()-1));
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const f = d => d.toISOString().slice(0,10);
  $('#ws').value = f(mon); $('#we').value = f(sun);
}
function week() { return {start:$('#ws').value, end:$('#we').value}; }

// ─── Build slides ───────────────────────────────────────────
function markdown(str) { return str; }

function buildSlides(d) {
  const rng = `${week().start} ~ ${week().end}`;
  const S = [];

  // 1 — Cover
  S.push({ cls:'cover', html:`
    <div class="cover-accent"></div>
    <h1>体系部门周会</h1>
    <div class="cover-sub">安全管理体系部门 · 周例会汇报材料</div>
    <div class="cover-meta"><span>${rng}</span></div>
  `});

  // 2 — TOC
  S.push({ cls:'toc', html:`
    <div class="toc-header">汇 报 提 纲</div>
    <div class="toc-list">
      ${['上周期主要完成工作','本期重点工作安排','现场检查及数据','重要事项及决议'].map((t,i)=>`
        <div class="toc-item"><span class="num">${i+1}</span><span class="label">${t}</span></div>
      `).join('')}
    </div>
  `});

  // 3 — 年度工作计划(6月) manual
  S.push(contentSlide(1, '2026年度工作计划/督办事项（截至6月）', rng,
    manualTable('slide_3', ['序号','工作任务','工作内容及要求','责任部门','完成时间','进展情况','下一步计划'], 10)));

  // 4 — 上级关注/督办项 manual
  S.push(contentSlide(1, '上级重点关注/督办项', rng,
    manualTable('slide_4', ['序号','来源','内容及要求','责任部门','完成时间','进展情况','下一步计划'], 10)));

  // 5 — 年度工作计划(7月) manual
  S.push(contentSlide(1, '2026年度工作计划/督办事项（7月）', rng,
    manualTable('slide_5', ['序号','工作任务','工作内容及要求','责任部门','完成时间','备注'], 6)));

  // 6 — 监查/监督报告 manual with seed
  S.push(contentSlide(2, '监查/监督报告提交', rng,
    manualTable('slide_6',
      ['序号','类别','现场','承包商','监理','合计'], 5,
      [['1','行为偏差培训','','','',''],['2','管理缺陷','','','',''],['3','施工质量缺陷','','','',''],['4','事件报告','','','',''],['5','安全质量领导小组会议签到表','','','','']])));

  // 7 — 行为偏差统计 AUTO
  S.push(contentSlide(3, '内外部行为偏差统计', rng, slide7(d)));

  // 8 — 隐患记录提交 AUTO
  S.push(contentSlide(4, '隐患记录提交', rng, slide8(d)));

  // 9 — 作业风险管控 manual
  S.push(contentSlide(5, '作业风险管控提交', rng,
    manualTable('slide_9', ['序号','提交类别','单位','检查人','落实情况'], 3)));

  // 10 — 隐患记录抽查 manual
  S.push(contentSlide(6, '职能部门隐患记录抽查情况', rng,
    manualTable('slide_10', ['序号','隐患记录数','隐患抽检数','备注'], 1)));

  // 11 — 预警刹车 AUTO
  S.push(contentSlide(7, '管理干部预警刹车统计', rng, slide11(d)));

  // 12 — 整改单关闭 AUTO
  S.push(contentSlide(8, '整改单关闭情况', rng, slideClose(d, 'rectification', '整改单')));

  // 13 — 通报关闭 AUTO
  S.push(contentSlide(9, '通报关闭情况', rng, slideClose(d, 'notice', '通报')));

  // 14 — 停工令关闭 AUTO
  S.push(contentSlide(10, '停工令关闭情况', rng, slideClose(d, 'stop_work', '停工令')));

  // 15 — 证件管理 manual
  S.push(contentSlide(11, '证件管理', rng,
    manualTable('slide_15', ['序号','证件类别','办证数量','取证数量','备注'], 8)));

  // 16 — 培训 AUTO
  S.push(contentSlide(12, '培训', rng, slide16(d)));

  // 17-18 — 体系主要工作 manual
  S.push(contentSlide(13, '体系主要工作（一）', rng,
    manualTable('slide_17', ['序号','工作内容','责任人','完成时间'], 8)));
  S.push(contentSlide(13, '体系主要工作（二）', rng,
    manualTable('slide_18', ['序号','工作内容','责任人','完成时间'], 8)));

  // 19 — 事件反馈 manual
  const k19 = 'slide_19';
  const s19 = savedManual[k19] || {};
  S.push(contentSlide(14, '本期重要事件反馈', rng, `
    <div class="form-block"><label>事件描述</label>
      <div class="field" contenteditable data-key="${k19}" data-field="事件描述">${s19['事件描述']||''}</div></div>
    <div class="form-block"><label>原因分析</label>
      <div class="field" contenteditable data-key="${k19}" data-field="原因分析">${s19['原因分析']||''}</div></div>
    <div class="form-block"><label>整改要求</label>
      <div class="field" contenteditable data-key="${k19}" data-field="整改要求">${s19['整改要求']||''}</div></div>
    <div class="edit-hint">点击文本框直接编辑</div>
  `));

  // 20-21 — 每周一学/一观 manual
  const k20 = 'slide_20', v20 = savedManual[k20] || {};
  S.push(contentSlide(15, '每周一学', rng, `
    <div class="form-block"><label>学习内容</label>
      <div class="field" contenteditable data-key="${k20}" data-field="学习内容" style="min-height:280px;">${v20['学习内容']||''}</div></div>
  `));
  const k21 = 'slide_21', v21 = savedManual[k21] || {};
  S.push(contentSlide(15, '每周一观', rng, `
    <div class="form-block"><label>观看内容</label>
      <div class="field" contenteditable data-key="${k21}" data-field="观看内容" style="min-height:280px;">${v21['观看内容']||''}</div></div>
  `));

  // 22 — End
  S.push({ cls:'end', html:`<h1>汇报完毕</h1>` });

  return S;
}

function contentSlide(n, title, range, body) {
  return { cls:'content', html:`
    <div class="slide-header">
      <span class="section-num">${n}</span><h2>${title}</h2>
      <div class="week-label">${range}</div>
    </div>
    <div class="slide-body">${body}</div>
  `};
}

// ─── Manual table builder ───────────────────────────────────
function manualTable(key, headers, rows, seed) {
  const saved = savedManual[key] || {};
  const data = saved.table && saved.table.length ? saved.table : (seed || []);
  while (data.length < rows) {
    data.push([String(data.length+1), ...headers.slice(1).map(()=>'')]);
  }
  let h = '<table class="data-table"><thead><tr>';
  headers.forEach(hd => h += `<th>${hd}</th>`);
  h += '</tr></thead><tbody>';
  data.forEach((row,ri) => {
    h += '<tr>';
    row.forEach((cell,ci) => {
      if (!cell && cell !== 0) cell = '';
      h += `<td contenteditable data-key="${key}" data-r="${ri}" data-c="${ci}">${cell}</td>`;
    });
    h += '</tr>';
  });
  h += '</tbody></table><div class="edit-hint">双击单元格编辑内容</div>';
  return h;
}

// ─── AUTO SLIDES ────────────────────────────────────────────

function slide7(d) {
  const bs = d.behavior_stats || {internal:[], external:[]};
  const it = bs.internal || [], et = bs.external || [];
  const isum = it.reduce((s,i)=>s+i.count,0), esum = et.reduce((s,i)=>s+i.count,0);

  let h = `<div class="stat-row">
    <div class="stat-item"><small>内部行为偏差</small><b>${isum}</b> 项</div>
    <div class="stat-item"><small>外部行为偏差（工程公司）</small><b>${esum}</b> 项</div>
  </div>`;
  if (!isum && !esum) return h+'<div class="empty-note">本周无行为偏差记录</div>';

  h += '<div class="col2">';
  // internal
  h += '<div><div class="sub-heading">内部行为偏差</div>';
  h += '<table class="data-table"><thead><tr><th>序号</th><th>行为偏差类别</th><th>违章数量</th><th>备注</th></tr></thead><tbody>';
  if (it.length) it.forEach((x,i)=>h+=`<tr><td>${i+1}</td><td class="left">${x.type}</td><td>${x.count}</td><td></td></tr>`);
  else h += '<tr><td colspan="4" class="empty-note">—</td></tr>';
  h += `<tr class="subtotal"><td></td><td>合计</td><td>${isum}</td><td></td></tr></tbody></table></div>`;

  // external
  h += '<div><div class="sub-heading">外部行为偏差（工程公司）</div>';
  h += '<table class="data-table"><thead><tr><th>序号</th><th>行为偏差类别</th><th>违章数量</th><th>备注</th></tr></thead><tbody>';
  if (et.length) et.forEach((x,i)=>h+=`<tr><td>${i+1}</td><td class="left">${x.type}</td><td>${x.count}</td><td></td></tr>`);
  else h += '<tr><td colspan="4" class="empty-note">—</td></tr>';
  h += `<tr class="subtotal"><td></td><td>合计</td><td>${esum}</td><td></td></tr></tbody></table></div>`;
  h += '</div><div class="edit-hint">数据来源：安全管理总台账 · 备注列可手动补充</div>';
  return h;
}

function slide8(d) {
  const ps = d.people_stats;
  if (!ps || !ps.groups) return '<div class="empty-note">加载中…</div>';

  let h = `<div class="stat-row">
    <div class="stat-item ok"><small>本周隐患录入总数</small><b>${ps.total_overall||0}</b> 条</div>
  </div>`;
  h += '<table class="data-table"><thead><tr><th>部门/类别</th><th>人员</th><th>隐患录入量</th><th>人均/天</th><th>是否达标</th><th>抽查人员</th></tr></thead><tbody>';

  ps.groups.forEach(g => {
    const ms = g.members || [];
    ms.forEach((m,i) => {
      const ad = Math.round(m.count/7*10)/10;
      const ok = ad >= 1 ? '<span class="badge badge-yes">是</span>' : '<span class="badge badge-no">否</span>';
      h += `<tr>
        <td>${i===0 ? '<b>'+g.category+'</b>' : ''}</td>
        <td>${m.name}</td>
        <td>${m.count}</td>
        <td>${ad}</td><td>${ok}</td>
        <td contenteditable data-manual-key="spot_${m.name}"></td>
      </tr>`;
    });
    h += `<tr class="subtotal"><td colspan="2">${g.category} 合计</td><td>${g.total}</td><td colspan="3"></td></tr>`;
  });
  h += '</tbody></table><div class="edit-hint">数据来源：隐患录入系统 · "抽查人员"列可手动填写</div>';
  return h;
}

function slide11(d) {
  const da = d.dept_alert;
  if (!da || !da.depts || !da.depts.length) return '<div class="empty-note">本周无预警刹车数据</div>';

  let h = '<div style="overflow-x:auto;">';
  // Build a combined type list
  const allTypes = [...(da.int_types||[]), ...(da.ext_types||[])];
  const intN = (da.int_types||[]).length, extN = (da.ext_types||[]).length;

  h += '<table class="data-table"><thead><tr><th rowspan="2">单位</th>';
  h += `<th colspan="${intN}">内部</th><th colspan="${extN}">工程公司</th></tr><tr>`;
  da.int_types.forEach(t=>h+=`<th>${t}</th>`);
  da.ext_types.forEach(t=>h+=`<th>${t}</th>`);
  h += '</tr></thead><tbody>';

  da.depts.forEach(d => {
    h += `<tr><td><b>${d.dept}</b></td>`;
    da.int_types.forEach(t=>h+=`<td>${d['int_'+t]||0}</td>`);
    da.ext_types.forEach(t=>h+=`<td>${d['ext_'+t]||0}</td>`);
    h += '</tr>';
  });
  h += '</tbody></table></div><div class="edit-hint">数据来源：安全管理总台账</div>';
  return h;
}

function slideClose(d, key, label) {
  const cs = d.close_status || {};
  const items = cs[key] || [];
  const closed = items.filter(i=>i.closed==='是'||i.closed==='已关闭');
  const open = items.filter(i=>!i.closed||i.closed==='否'||i.closed==='');

  let h = `<div class="stat-row">
    <div class="stat-item"><small>总份数</small><b>${items.length}</b></div>
    <div class="stat-item ok"><small>已关闭</small><b>${closed.length}</b></div>
    <div class="stat-item warn"><small>未关闭</small><b>${open.length}</b></div>
  </div>`;
  if (!items.length) return h+'<div class="empty-note">本周无'+label+'数据</div>';

  h += '<table class="data-table"><thead><tr>';
  ['序号','来源','编号','责任部门','下发日期','主要内容','整改期限','是否关闭','情况说明'].forEach(hd=>h+=`<th>${hd}</th>`);
  h += '</tr></thead><tbody>';
  items.forEach((x,i) => {
    const c = x.closed==='是'||x.closed==='已关闭';
    h += `<tr>
      <td>${i+1}</td><td>${x.source||''}</td><td>${x.no||''}</td>
      <td>${x.dept||''}</td><td>${x.issue_date||''}</td>
      <td class="left">${x.content||''}</td><td>${x.deadline||''}</td>
      <td><span class="badge ${c?'badge-yes':'badge-no'}">${c?'是':'否'}</span></td>
      <td>${x.remark||''}</td>
    </tr>`;
  });
  h += '</tbody></table><div class="edit-hint">数据来源：安全管理总台账</div>';
  return h;
}

function slide16(d) {
  const t = d.training || {items:[], materials_count:0};
  let h = `<div class="stat-row">
    <div class="stat-item"><small>培训场次</small><b>${t.items.length}</b></div>
    <div class="stat-item"><small>资料库</small><b>${t.materials_count}</b> 份</div>
  </div>`;
  if (!t.items.length) return h+'<div class="empty-note">本周无培训安排</div>';
  h += '<table class="data-table"><thead><tr><th>序号</th><th>日期</th><th>培训内容</th><th>培训人</th></tr></thead><tbody>';
  t.items.forEach((x,i) => {
    const d = new Date(x.date);
    const wd = WEEK[d.getDay()];
    h += `<tr><td>${i+1}</td><td>${x.date} ${wd}</td><td class="left">${x.content}</td><td contenteditable data-manual-key="trainer_${i}"></td></tr>`;
  });
  h += '</tbody></table>';
  return h;
}

// ─── Render ─────────────────────────────────────────────────
let SLIDES = [];

function render() {
  SLIDES = buildSlides(meetingData);
  const stage = $('#stage');
  stage.innerHTML = '';
  SLIDES.forEach((s,i) => {
    const el = document.createElement('div');
    el.className = 'slide' + (s.cls ? ' '+s.cls : '');
    el.innerHTML = s.html;
    el.id = 'slide-'+i;
    stage.appendChild(el);
  });
  total = SLIDES.length;
  $('#tot').textContent = total;
  show(Math.min(cur, total-1));
}

function show(i) {
  if (i<0||i>=total) return;
  $$('.slide').forEach(s=>s.classList.remove('active'));
  const el = $('#slide-'+i);
  if (el) el.classList.add('active');
  cur = i;
  $('#cur').textContent = i+1;
}

// ─── Data ───────────────────────────────────────────────────
async function load() {
  const w = week();
  try {
    const [r1,r2] = await Promise.all([
      fetch(`/api/meeting/data?start=${w.start}&end=${w.end}`),
      fetch('/api/meeting/manual'),
    ]);
    meetingData = await r1.json();
    savedManual = await r2.json();
  } catch(e) { console.error(e); }
  render();
  updateSaveDot();
}

function collectEdits() {
  const edits = {};
  $$('[contenteditable][data-key]').forEach(el => {
    const k = el.dataset.key;
    if (!edits[k]) edits[k] = {table:[], fields:{}};
    if (el.dataset.field) { edits[k].fields[el.dataset.field] = el.textContent; return; }
    if (el.dataset.r !== undefined) {
      const r = +el.dataset.r, c = +el.dataset.c;
      while (edits[k].table.length <= r) edits[k].table.push([]);
      edits[k].table[r][c] = el.textContent;
    }
  });
  // Clean: convert to dense
  const out = {};
  for (const [k, v] of Object.entries(edits)) {
    const tbl = v.table.filter(row => row && row.some(c => c && c.trim()));
    const fields = v.fields;
    if (tbl.length || Object.keys(fields).length) {
      out[k] = {};
      if (tbl.length) out[k].table = tbl;
      Object.assign(out[k], fields);
    }
  }
  return out;
}

async function save() {
  const edits = collectEdits();
  for (const [id, data] of Object.entries(edits)) {
    await fetch('/api/meeting/manual', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({slide_id:id, data}),
    });
  }
  dirty = false;
  updateSaveDot();
}

async function exportPPTX() {
  const btn = $('#btn-export');
  btn.textContent = '生成中…'; btn.disabled = true;
  try {
    const resp = await fetch('/api/meeting/export-pptx', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({slides:[], start:week().start, end:week().end}),
    });
    if (!resp.ok) { const e=await resp.json(); throw new Error(e.error); }
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `体系部门周会材料_${week().start}.pptx`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  } catch(e) { alert('导出失败: '+e.message); }
  btn.textContent = '导出PPTX'; btn.disabled = false;
}

function updateSaveDot() {
  $('#save-dot').innerHTML = dirty
    ? '<span class="save-dot unsaved"></span>未保存'
    : '<span class="save-dot saved"></span>已保存';
}

// ─── Events ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initDates();
  load();

  $('#btn-refresh').onclick = load;
  $('#btn-prev').onclick = ()=>show(cur-1);
  $('#btn-next').onclick = ()=>show(cur+1);
  $('#btn-export').onclick = exportPPTX;

  document.addEventListener('keydown', e => {
    if (e.target.isContentEditable) {
      if (e.ctrlKey && e.key==='s') { e.preventDefault(); save(); }
      return;
    }
    if (['ArrowRight','ArrowDown','PageDown'].includes(e.key)) { e.preventDefault(); show(cur+1); }
    else if (['ArrowLeft','ArrowUp','PageUp'].includes(e.key)) { e.preventDefault(); show(cur-1); }
    else if (e.ctrlKey && e.key==='s') { e.preventDefault(); save(); }
  });

  $('#stage').addEventListener('input', e => {
    if (e.target.isContentEditable) { dirty = true; updateSaveDot(); }
  });

  // Auto-save on blur
  $('#stage').addEventListener('focusout', e => {
    if (e.target.isContentEditable && dirty) save();
  });

  // Hide keyboard hint
  setTimeout(()=>{ const h=$('#keyhint'); if(h)h.style.opacity='0'; }, 10000);
});
</script>
</body>
</html>
