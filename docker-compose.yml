version: "3.8"

services:
  hazard-center:
    build: .
    container_name: hazard-data-center
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HAZARD_HOST_PORT:-8010}:8010"
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 20s
