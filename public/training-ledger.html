<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>培训台账共享中心</title>
  <link rel="stylesheet" href="/training-ledger.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/training-ledger">
      <span class="brand-mark">训</span>
      <span><b>培训台账</b><small>共享中心</small></span>
    </a>
    <div class="top-actions">
      <label class="search"><span>⌕</span><input id="keyword" placeholder="搜索培训名目、日期"></label>
      <button class="ghost" id="adminBtn">管理上传</button>
      <button class="ghost hidden" id="batchImportBtn">批量导入</button>
      <button class="primary hidden" id="newEventBtn">＋ 新增培训</button>
    </div>
  </header>

  <main>
    <section class="intro">
      <div>
        <p class="eyebrow">TRAINING ARCHIVE</p>
        <h1>每场培训，一处归档</h1>
        <p>签到单、培训照片和相关文件统一保存。打开即可查看，点击即可下载。</p>
      </div>
      <div class="stats">
        <div><strong id="eventCount">0</strong><span>培训名目</span></div>
        <div><strong id="fileCount">0</strong><span>归档文件</span></div>
      </div>
    </section>

    <section class="section-head">
      <div><h2>培训记录</h2><p id="resultText">正在读取台账…</p></div>
      <button class="text-button" id="refreshBtn">刷新</button>
    </section>
    <section id="eventList" class="event-list"></section>
  </main>

  <div class="modal" id="passwordModal" aria-hidden="true">
    <form class="dialog" id="passwordForm">
      <button type="button" class="close" data-close>×</button>
      <p class="eyebrow">ADMIN ACCESS</p><h2>进入管理模式</h2>
      <p>验证后可新增培训名目并上传资料。</p>
      <label>管理密码<input id="passwordInput" type="password" autocomplete="current-password" required></label>
      <button class="primary wide">验证并进入</button>
    </form>
  </div>

  <div class="modal" id="eventModal" aria-hidden="true">
    <form class="dialog" id="eventForm">
      <button type="button" class="close" data-close>×</button>
      <input id="eventEditId" type="hidden">
      <p class="eyebrow">TRAINING INFO</p><h2 id="eventFormTitle">新增培训名目</h2>
      <label>培训名称<input id="eventName" placeholder="例如：高处作业安全培训" required></label>
      <label>培训日期<input id="eventDate" type="date" required></label>
      <div class="form-grid">
        <label>培训地点<input id="eventLocation" placeholder="例如：项目部会议室"></label>
        <label>培训讲师<input id="eventInstructor" placeholder="讲师姓名"></label>
        <label>培训对象<input id="eventAudience" placeholder="例如：全体管理人员"></label>
        <label>培训人数<input id="eventParticipantCount" type="number" min="0" placeholder="0"></label>
      </div>
      <label>备注（选填）<textarea id="eventDescription" rows="3" placeholder="其他补充说明"></textarea></label>
      <button class="primary wide" id="eventSubmitBtn">创建培训</button>
    </form>
  </div>

  <div class="modal" id="batchModal" aria-hidden="true">
    <div class="dialog batch-dialog">
      <button type="button" class="close" data-close>×</button>
      <div class="batch-head">
        <div><p class="eyebrow">BATCH IMPORT</p><h2>批量导入培训资料</h2></div>
        <span id="batchProgress">尚未选择文件</span>
      </div>
      <label class="batch-picker" id="batchPicker">
        <input id="batchFiles" type="file" accept="image/*,.pdf,application/pdf" multiple>
        <span>＋</span><b>选择或拖入大量 PDF 和照片</b><small>导入后将按顺序逐个确认归档</small>
      </label>
      <div id="batchWorkspace" class="batch-workspace hidden">
        <section class="batch-preview">
          <div class="preview-title"><b id="batchFileName"></b><small id="batchFileSize"></small></div>
          <div id="batchPreviewContent" class="preview-content"></div>
        </section>
        <section class="batch-form">
          <label>培训日期<input id="batchDate" type="date"></label>
          <label>选择当天培训名录
            <select id="batchEventSelect"></select>
          </label>
          <label id="batchNewNameWrap">新培训名称<input id="batchNewName" placeholder="输入新培训名目"></label>
          <div class="form-grid">
            <label>培训地点<input id="batchLocation" placeholder="培训地点"></label>
            <label>培训讲师<input id="batchInstructor" placeholder="讲师姓名"></label>
            <label>培训对象<input id="batchAudience" placeholder="培训对象"></label>
            <label>培训人数<input id="batchParticipantCount" type="number" min="0" placeholder="0"></label>
          </div>
          <div class="batch-actions">
            <button class="ghost" id="batchSkipBtn">跳过此文件</button>
            <button class="primary" id="batchSaveBtn">归档并查看下一个</button>
          </div>
        </section>
      </div>
    </div>
  </div>

  <div class="modal" id="uploadModal" aria-hidden="true">
    <div class="dialog upload-dialog">
      <button type="button" class="close" data-close>×</button>
      <p class="eyebrow">UPLOAD FILES</p><h2 id="uploadTitle">上传培训资料</h2>
      <p>可同时选择签到单、照片和其他文件，上传后自动加上培训日期。</p>
      <label class="dropzone" id="dropzone">
        <input id="fileInput" type="file" multiple>
        <span class="upload-icon">⇧</span>
        <b>拖拽文件到这里</b>
        <small>或点击选择文件 · 单个文件不超过 30MB</small>
      </label>
      <div id="fileQueue" class="file-queue"></div>
      <button class="primary wide" id="uploadBtn" disabled>开始上传</button>
    </div>
  </div>

  <div id="toast"></div>
  <script src="/training-ledger.js"></script>
</body>
</html>
