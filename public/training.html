<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>安全培训 — GXAJB</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/training.css">
</head>
<body class="training-body">
  <div class="training-site">
    <header class="training-top">
      <div>
        <small>GXAJB TRAINING</small>
        <h1>安全培训</h1>
        <p>培训安排查询与资料管理</p>
      </div>
      <nav class="training-tabs">
        <button class="tab active" data-tab="schedule">培训安排</button>
        <button class="tab" data-tab="materials">培训资料</button>
      </nav>
    </header>

    <div id="tabSchedule" class="tab-panel active">
      <section class="filters panel">
        <label>开始日期<input type="date" id="trainingStart"></label>
        <label>结束日期<input type="date" id="trainingEnd"></label>
        <label>关键词<input id="trainingKeyword" placeholder="公司级、项目级、焊工、电工…"></label>
        <button class="primary" onclick="loadTraining()">查询安排</button>
        <button onclick="setTrainingThisWeek()">本周</button>
      </section>

      <section class="panel training-hero">
        <div><h2>本周培训 / 考试安排</h2><p id="trainingSummary">正在读取培训安排…</p></div>
        <div class="training-legend"><span><i></i>上午第一场 08:00-10:00</span><span><i></i>上午第二场 10:00-11:30</span><span><i></i>下午 14:00-17:30</span><span><i></i>晚上 19:00-20:30</span></div>
      </section>

      <section id="trainingList" class="training-list"></section>
    </div>

    <div id="tabMaterials" class="tab-panel">
      <section class="filters panel">
        <label>分类筛选<select id="materialCategoryFilter"><option value="">全部分类</option></select></label>
        <button class="primary" onclick="loadMaterials()">筛选</button>
        <button id="materialsAddBtn" style="display:none" onclick="openMaterialEdit()">＋ 添加资料</button>
      </section>
      <section id="materialsContent"></section>
    </div>
  </div>

  <div class="modal-overlay" id="passwordModal">
    <div class="modal-box">
      <h3>验证身份</h3>
      <p>请输入编辑密码</p>
      <input type="password" id="editPassword" placeholder="请输入密码" autocomplete="off">
      <div class="modal-actions">
        <button onclick="closePasswordModal()">取消</button>
        <button class="primary" id="passwordConfirmBtn">确认</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="editModal">
    <div class="modal-box modal-wide">
      <h3>编辑培训安排</h3>
      <input type="hidden" id="editEventId">
      <label>时间段<input id="editTime" placeholder="08:00-10:00"></label>
      <label>场次<input id="editPeriod" placeholder="上午第一场"></label>
      <label>标题<input id="editTitle" placeholder="培训标题"></label>
      <label>标签（用顿号、逗号或换行分隔）<textarea id="editItems" rows="3" placeholder="公司级、签到"></textarea></label>
      <div class="modal-actions">
        <button class="danger" id="editResetBtn">恢复默认</button>
        <button onclick="closeEditModal()">取消</button>
        <button class="primary" onclick="saveEdit()">保存</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="materialEditModal">
    <div class="modal-box modal-wide">
      <h3 id="materialEditTitle">添加资料</h3>
      <input type="hidden" id="materialEditId">
      <label>分类<select id="materialEditCategory"></select></label>
      <label>标题<input id="materialEditName" placeholder="资料标题"></label>
      <label>排序<input type="number" id="materialEditSort" value="0" style="width:100px"></label>
      <label>内容<textarea id="materialEditContent" rows="12" placeholder="支持换行，将按段落展示"></textarea></label>
      <div class="modal-actions">
        <button class="danger" id="materialDeleteBtn" style="display:none">删除</button>
        <button onclick="closeMaterialEditModal()">取消</button>
        <button class="primary" onclick="saveMaterial()">保存</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="/training-app.js"></script>
</body>
</html>
